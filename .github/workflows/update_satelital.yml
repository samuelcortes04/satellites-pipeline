name: Update Satelital

on:
  schedule:
    - cron: '0 0 1 1 *'
  workflow_dispatch:       

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install earthengine-api geemap

      - name: Correr script
        env:
          GEE_CREDENTIALS: ${{ secrets.GEE_CREDENTIALS }}
        run: |
          python update_satelital.py

      - name: Guardar CSV al repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "Update satelital $(date +'%Y')" || echo "No changes"
          git push
